image boot.vfat {
    vfat {
    	label = "boot"
        files = {
            	"BOOT.bin",
		        "boot.scr",
                "QSPI.bin",
            	"uImage",
            	"devicetree.dtb",
		        "uramdisk.image",
		        "image.ub",
            	"firmware_fpga.bit"
        }
    }
    size = 128M
}
image data.ext4 {
    ext4 {
        label = "data"
    }
    size = 512M
}
image sdcard.img {
    hdimage {
        partition-table-type = "mbr" 
    }
    partition boot {
        partition-type = 0xC
        bootable = "true"
        image = "boot.vfat"
    }
    partition rootfs {
        partition-type = 0x83
        image = "rootfs.ext4"
    }
    partition data {
        partition-type = 0x83
        image = "data.ext4"
    }
}